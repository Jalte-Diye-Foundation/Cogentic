name: Daily Content Pipeline

on:
  schedule:
    # 09:00 AM IST = 03:30 UTC
    - cron: "30 3 * * *"
  workflow_dispatch:

jobs:
  generate-daily-poster:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run daily content pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Update website assets
        run: python website_assets/update_assets.py

      - name: Commit and push updated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add website_assets/latest
          git commit -m "Update daily website assets [skip ci]" || echo "No changes to commit"
          git push

      - name: Upload generated poster
        uses: actions/upload-artifact@v4
        with:
          name: daily-poster-${{ github.run_id }}
          path: output/**/*
          if-no-files-found: error
