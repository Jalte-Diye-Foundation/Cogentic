name: Daily Content Generation

on:
  schedule:
    - cron: '0 9 * * *'   # daily at 9 AM UTC
  workflow_dispatch:      # manual trigger

jobs:
  generate-daily-poster:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install Pillow

      - name: Run daily pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scheduler/daily_runner.py

      - name: Update website assets (only on main)
        if: github.ref == 'refs/heads/main'   # <-- critical condition
        run: python update_assets.py

      - name: Commit and push changes
        if: github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add website_assets/latest/
          git diff --staged --quiet || git commit -m "Update daily website assets [skip ci]"
          git push
